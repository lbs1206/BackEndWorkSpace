version: "3.9"

services:
  web:
    image: node:24-bookworm
    container_name: backendworkspace-web
    working_dir: /workspace
    command: sh -c "corepack enable && yarn install --frozen-lockfile --prefer-offline && yarn workspace web run dev --webpack -H 0.0.0.0 -p 3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      YARN_CACHE_FOLDER: /yarn-cache
    cpus: "${WEB_CPUS:-3.0}"
    cpu_shares: "${WEB_CPU_SHARES:-2048}"
    ports:
      - "3000:3000"
    volumes:
      - ../../:/workspace
      - web_root_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
      - web_yarn_cache:/yarn-cache
    depends_on:
      - api

  api:
    image: gradle:8.12.1-jdk21
    container_name: backendworkspace-api
    working_dir: /workspace/apps/api
    command: gradle bootRun --no-daemon
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/backendworkspace
      SPRING_DATASOURCE_USERNAME: backendworkspace
      SPRING_DATASOURCE_PASSWORD: backendworkspace
    ports:
      - "8080:8080"
    cpus: "${API_CPUS:-1.5}"
    cpu_shares: "${API_CPU_SHARES:-1024}"
    volumes:
      - ../../:/workspace
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: backendworkspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: backendworkspace
      POSTGRES_USER: backendworkspace
      POSTGRES_PASSWORD: backendworkspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  gradle_cache:
  web_root_node_modules:
  web_app_node_modules:
  web_yarn_cache:
