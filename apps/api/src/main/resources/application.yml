spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/backendworkspace
    username: backendworkspace
    password: backendworkspace
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always
management:
  endpoints:
    web:
      exposure:
        include: health,info
